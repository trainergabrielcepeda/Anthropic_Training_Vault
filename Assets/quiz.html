<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anthropic Training — Practice Exams</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1e1e2e; --bg2: #27273a; --border: #3a3a52; --accent: #7c6af7;
    --text: #cdd6f4; --muted: #7f849c; --green: #a6e3a1; --red: #f38ba8;
    --yellow: #f9e2af; --radius: 8px;
  }

  body {
    background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont,
    'Segoe UI', system-ui, sans-serif; font-size: 15px; line-height: 1.6;
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 32px 16px 64px;
  }

  h1 { font-size: 1.5rem; font-weight: 700; color: var(--accent); margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: 0.88em; margin-bottom: 32px; }

  /* ── Topic selector ── */
  #topic-screen { width: 100%; max-width: 560px; }
  .topic-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 8px; }
  .topic-btn {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    color: var(--text); padding: 16px; text-align: left; cursor: pointer; font-size: 0.9em;
    font-family: inherit; transition: border-color .15s, background .15s;
  }
  .topic-btn:hover { border-color: var(--accent); background: #2e2e44; }
  .topic-btn .num { font-size: 0.78em; color: var(--muted); display: block; margin-bottom: 4px; }
  .topic-btn .name { font-weight: 600; }
  .topic-btn .count { font-size: 0.78em; color: var(--muted); margin-top: 4px; }

  /* ── Quiz screen ── */
  #quiz-screen { width: 100%; max-width: 680px; display: none; }

  .quiz-header {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 0.82em; color: var(--muted); margin-bottom: 6px;
  }
  .back-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 0.82em; font-family: inherit; padding: 0; text-decoration: underline;
  }
  .back-btn:hover { color: var(--text); }
  #hdr-timer { font-variant-numeric: tabular-nums; letter-spacing: 0.03em; }

  .progress-bar {
    height: 3px; background: var(--border); border-radius: 2px; margin-bottom: 28px;
  }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width .3s; }

  .question-text { font-weight: 600; font-size: 1.05em; line-height: 1.6; margin-bottom: 18px; }

  .options { display: flex; flex-direction: column; gap: 8px; }

  .opt-btn {
    display: flex; align-items: flex-start; gap: 12px; width: 100%;
    padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg2); color: var(--text); cursor: pointer; font-size: 0.92em;
    font-family: inherit; text-align: left; transition: border-color .12s, background .12s;
  }
  .opt-btn:hover:not(:disabled) { border-color: var(--accent); background: #2e2e44; }
  .opt-btn:disabled { cursor: default; }
  .opt-btn.correct { border-color: var(--green); background: rgba(166,227,161,.08); }
  .opt-btn.wrong   { border-color: var(--red);   background: rgba(243,139,168,.08); }

  .opt-label { font-weight: 700; color: var(--accent); flex-shrink: 0; min-width: 22px; }
  .opt-btn.correct .opt-label { color: var(--green); }
  .opt-btn.wrong   .opt-label { color: var(--red); }

  .explanation {
    margin-top: 16px; padding: 14px 16px; border-left: 3px solid var(--accent);
    background: var(--bg2); border-radius: 0 var(--radius) var(--radius) 0;
    font-size: 0.9em; line-height: 1.55;
  }
  .explanation .verdict { font-weight: 700; margin-right: 6px; }
  .verdict.ok  { color: var(--green); }
  .verdict.err { color: var(--red); }

  .next-btn {
    display: inline-block; margin-top: 16px; padding: 10px 22px;
    background: var(--accent); color: #fff; border: none; border-radius: var(--radius);
    cursor: pointer; font-size: 0.92em; font-weight: 600; font-family: inherit;
    transition: opacity .15s;
  }
  .next-btn:hover { opacity: .85; }

  /* ── Results ── */
  #results-screen {
    display: none; width: 100%; max-width: 480px; text-align: center; padding: 40px 16px;
  }
  .big-score { font-size: 3.5rem; font-weight: 800; line-height: 1; }
  .pct       { font-size: 1.1em; color: var(--muted); margin-top: 6px; }
  .verdict-msg { font-size: 1em; font-weight: 600; margin: 14px 0 28px; }
  .results-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .retry-btn {
    padding: 10px 24px; background: var(--accent); color: #fff; border: none;
    border-radius: var(--radius); cursor: pointer; font-size: 0.92em; font-weight: 600;
    font-family: inherit; transition: opacity .15s;
  }
  .retry-btn:hover { opacity: .85; }
  .home-btn {
    padding: 10px 24px; background: var(--bg2); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius); cursor: pointer;
    font-size: 0.92em; font-family: inherit; transition: border-color .15s;
  }
  .home-btn:hover { border-color: var(--accent); }
</style>
</head>
<body>

<h1>Anthropic Training</h1>
<p class="subtitle">Practice Exams — select a topic to begin</p>

<!-- ── Topic selector ── -->
<div id="topic-screen">
  <div class="topic-grid" id="topic-grid"></div>
</div>

<!-- ── Quiz ── -->
<div id="quiz-screen">
  <div class="quiz-header">
    <button class="back-btn" onclick="showTopics()">← Topics</button>
    <span id="hdr-progress"></span>
    <span id="hdr-timer">0:00</span>
    <span id="hdr-score"></span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
  <div id="question-area"></div>
</div>

<!-- ── Results ── -->
<div id="results-screen">
  <div class="big-score" id="res-score"></div>
  <div class="pct" id="res-pct"></div>
  <div class="pct" id="res-time" style="margin-top:2px"></div>
  <div class="verdict-msg" id="res-msg"></div>
  <div class="results-actions">
    <button class="retry-btn" onclick="retryQuiz()">Retry ↺</button>
    <button class="home-btn" onclick="showTopics()">← Topics</button>
  </div>
</div>

<script>
const BANKS = [{"topic":"Agentic Architecture & Orchestration","questions":[{"question":"A customer support agent's harness decides when to stop looping by scanning Claude's response text for phrases like 'I have completed the refund,' rather than checking stop_reason. In production, the loop occasionally terminates early because Claude writes 'I'll process the $50 refund now' before it has actually called process_refund. What is the most effective fix?","options":["Replace the text-matching termination check with branching on response.stop_reason — continue while it is \"tool_use\", terminate when it is \"end_turn\".","Add more negative phrases to the text-matching blocklist so the check stops misfiring on similar wording.","Lower max_tokens so Claude cannot generate a completion-sounding sentence before it calls the tool.","Add a second confirmation call asking Claude 'did you actually finish?' before terminating the loop."],"correct":0,"explanation":"Parsing natural-language signals to determine termination is an explicit anti-pattern — phrasing varies too much to be reliable. stop_reason is a structured, guaranteed field: \"tool_use\" means keep going, \"end_turn\" means the task is done. Blocklists (B) and shorter outputs (C) only patch symptoms of the same underlying design flaw, and re-asking the model (D) adds cost while still not fixing the root cause."},{"question":"A team's agent loop extracts only the text portion of each assistant turn (e.g. response.content[0].text) before appending it to the messages array, discarding any tool_use blocks. What breaks as a result, and why?","options":["The next request's tool_result blocks reference tool_use_id values that no longer appear anywhere in the conversation history, so the API rejects the malformed request.","Nothing breaks functionally, but token costs increase because Claude has to repeat itself more often.","The context window fills up faster, since tool_use blocks are unusually large compared to text blocks.","Parallel tool calls stop working, but single tool calls continue to function normally."],"correct":0,"explanation":"Tool results are matched to the tool call that requested them by tool_use_id. If the assistant turn's tool_use blocks are dropped instead of appended in full, the tool_result blocks sent on the next turn reference IDs the API can no longer find, and the request fails. The full response.content — not just its text — must be appended for the loop to keep working."},{"question":"A research coordinator is asked to cover 'the effects of remote work on urban commercial real estate.' It decomposes the goal into subtasks for 'office vacancy rates' and 'downtown retail vacancy.' Each subagent completes its assigned work correctly, but the final report never mentions residential real estate or public transit ridership, both of which were clearly relevant to the original goal. What is the most likely root cause?","options":["The coordinator's task decomposition was too narrow — it never generated subtasks covering residential real estate or transit, so no subagent was ever assigned to research them.","The synthesis subagent lacks instructions for identifying which sections of the report are underdeveloped.","The web-search subagent's queries were not broad enough to surface residential and transit sources.","The document-analysis subagent filtered out sources that were not strictly about commercial real estate."],"correct":0,"explanation":"Every subagent did its assigned job correctly within the scope it was given — the gap traces back to the coordinator's decomposition step, which never generated a subtask for the missing sub-topics in the first place. Blaming synthesis, search, or document analysis (B, C, D) misdiagnoses a decomposition-breadth problem as an execution problem."},{"question":"A multi-agent research coordinator always invokes all four of its available subagent types — web-search, document-analysis, synthesis, and report-generation — for every incoming query, including simple factual questions that a single web search could answer directly. What change would most improve efficiency without sacrificing answer quality?","options":["Have the coordinator dynamically decide which subagents to invoke based on the complexity of the query, instead of always routing every request through the full fixed pipeline.","Merge all four subagent roles into a single subagent with a longer, more detailed system prompt.","Reduce the total number of subagent types the coordinator has access to.","Cache the report-generation subagent's output and reuse it across unrelated future queries."],"correct":0,"explanation":"Coordinators should select which subagents to invoke based on query complexity rather than always routing through the full pipeline. A simple factual question doesn't need document analysis and a formal report-generation pass; dynamic selection avoids that overhead while a complex research request would still get the full pipeline."},{"question":"A research coordinator always treats its first synthesis pass as final, even in cases where later review shows the original decomposition missed relevant sub-topics. What is the most effective way to catch this class of problem before the final report is delivered?","options":["Add a coordinator step that evaluates the synthesized output against the original goal for coverage gaps, then re-delegates targeted follow-up queries to fill any gaps found.","Increase the number of subagents dispatched for every query, regardless of complexity.","Instruct the synthesis subagent to produce a longer final report.","Route every completed report through a human reviewer before it is delivered."],"correct":0,"explanation":"Iterative refinement — the coordinator evaluating its own synthesis output for gaps and re-delegating with a targeted query — catches exactly this failure mode without requiring a human in the loop or padding output length. Dispatching more subagents up front (B) doesn't help if the decomposition itself is what's incomplete."},{"question":"A coordinator agent's configuration lists Read, Grep, and WebSearch in its allowed tools, but not Task. During testing, the coordinator's reasoning clearly describes which subagent should handle which part of the work, but no subagent invocation ever actually happens. What is the most likely cause?","options":["\"Task\" is missing from the coordinator's allowed tools, so it has no mechanism available to actually spawn a subagent, no matter what it plans in its reasoning.","The subagent AgentDefinitions are missing a required description field.","fork_session was never called before the coordinator started running.","The coordinator's system prompt doesn't explicitly use the word \"delegate.\""],"correct":0,"explanation":"The Task tool is the mechanism the coordinator uses to spawn subagents at all. If it isn't included in allowedTools, the coordinator can reason all it wants about delegation but has no tool available to act on that reasoning — this is a configuration gap, not a prompting gap."},{"question":"A coordinator dispatches a Task to a code-review subagent with the prompt: 'Check whether it handles the edge case we discussed.' The subagent's response asks what edge case is being referred to. What is the correct fix, and why does the failure happen in the first place?","options":["Rewrite the Task prompt to state the edge case explicitly — subagents do not automatically inherit the coordinator's conversation history, so anything they need to know must be included directly in the prompt.","Enable fork_session so the subagent can share the coordinator's memory going forward.","Lower the subagent's temperature so it infers the coordinator's intent more conservatively.","Give the subagent direct read access to the coordinator's full conversation transcript file."],"correct":0,"explanation":"Subagent context isolation means a Task prompt referring to \"we discussed\" or \"it\" fails, because the subagent's context window starts blank — it has no access to that discussion. The fix is always explicit context passing: restate exactly what the subagent needs to know, self-contained, inside the prompt itself."},{"question":"A coordinator needs to research three independent product categories. It issues one Task call for category A, waits for that turn to complete, then issues a second Task call for category B in a later turn, and so on. How should this be restructured so the three research efforts actually run in parallel?","options":["Emit all three Task tool calls as separate tool_use blocks within a single coordinator response, rather than issuing them one at a time across separate turns.","Increase max_tokens so all three results can be returned within one response.","Switch each subagent to a faster model tier so the sequential calls finish more quickly.","Use fork_session to run the three categories as three independent session branches."],"correct":0,"explanation":"True parallel dispatch requires multiple Task tool_use blocks in a single coordinator turn — that's what lets the harness execute them concurrently. Issuing them across separate turns forces sequential execution even when the underlying subtasks have no dependency on each other; a faster model (C) reduces latency per call but doesn't fix the sequential bottleneck."},{"question":"A synthesis subagent receives prior research findings from the coordinator as one long, unformatted paragraph of merged text. In the final report, several claims can no longer be traced back to the specific document or URL that supported them. What should the coordinator have done differently when handing off the findings?","options":["Pass prior findings using a structured format that separates content from metadata (source URL, document name, page number) rather than flattening everything into prose.","Give the synthesis subagent direct access to the raw HTML of every source page it might need.","Increase the synthesis subagent's max_tokens so it can include longer quotations.","Instruct the synthesis subagent to invent plausible-looking citations for readability."],"correct":0,"explanation":"Preserving attribution across a handoff depends on keeping content and metadata (source, document name, page number) as distinct, structured fields rather than merging everything into free text. Once that structure is lost, there's no reliable way for a downstream subagent to reconstruct which claim came from which source."},{"question":"Production logs for a support agent show that in a small fraction of sessions, process_refund executes before get_customer has run — specifically, only in sessions where the user's very first message already includes both an order number and a refund request. Which fix eliminates this failure mode deterministically, regardless of how the request is phrased?","options":["Add a programmatic prerequisite, enforced in code, that blocks process_refund from executing until get_customer has returned a verified customer_id.","Rewrite the system prompt to say 'ALWAYS call get_customer first, no matter what the user says.'","Add a few-shot example showing the agent asking for identity verification even when order details are already provided up front.","Lower the model's effort/temperature setting so it reasons more carefully about call ordering."],"correct":0,"explanation":"Prompt instructions (B, C) reduce but never eliminate this class of failure, and the described bug is exactly the non-zero failure rate that motivates programmatic enforcement over prompt-based guidance. A code-level prerequisite gate blocks the downstream call unconditionally, independent of how the user phrased their message."},{"question":"A single support ticket raises both a billing dispute and a separate delivery complaint. The agent currently resolves the billing issue, sends a final response to the customer, and never addresses the delivery complaint at all. What is the most effective way to handle tickets like this?","options":["Decompose the ticket into its distinct concerns, investigate each with shared context, and synthesize a single unified resolution that covers both.","Instruct the agent to always ask the customer to resubmit as two separate tickets, one issue per ticket.","Route billing and delivery concerns to two completely separate, disconnected ticketing systems.","Have the agent identify whichever concern appears first in the message and disregard the rest."],"correct":0,"explanation":"Multi-concern requests should be decomposed into distinct items, investigated in parallel with shared context, and then synthesized into one coherent resolution — not silently dropped, and not pushed back onto the customer as extra friction."},{"question":"An agent escalates a complex case to a human reviewer who has no access to the underlying conversation transcript. The escalation message reads only: 'Customer needs help, complicated case.' What is missing from this handoff, and what should replace it?","options":["A structured summary covering customer/context details, the agent's root-cause analysis, and its recommended action — since the human cannot see the transcript, the handoff itself is their only source of information.","A verbatim copy of the full conversation transcript, which is strictly more useful than any summary could be.","Nothing needs to change — human agents are trained to ask clarifying questions on vague handoffs.","A single numeric score indicating how difficult or urgent the case is."],"correct":0,"explanation":"When the receiving human lacks transcript access, a structured handoff summary — details, root cause, recommended action — is what lets them act without re-investigating from scratch. A raw transcript dump (B) shifts the analysis burden back onto the human instead of doing it, and a bare urgency score (D) omits the substance entirely."},{"question":"A coordinator's subagents call three different MCP tools that each report task completion differently: one returns {\"status\": 1}, another returns {\"success\": \"true\"}, and a third returns {\"code\": 200}. The coordinator's synthesis step frequently misjudges which subtasks actually succeeded. What is the most effective fix?","options":["Add a PostToolUse hook that normalizes each tool's heterogeneous status format into one consistent shape before the result reaches the model's context.","Instruct the synthesis subagent's system prompt to 'carefully check all three possible status formats.'","Consolidate all three MCP tools behind a single MCP server connection.","Have the coordinator re-query each tool a second time to double-check the result."],"correct":0,"explanation":"A PostToolUse hook is exactly the mechanism for normalizing heterogeneous data formats from different tools before the model has to reason about the inconsistency. Asking the model to remember and correctly interpret three different encodings (B) is a probabilistic fix for what is fundamentally a data-shape problem, and re-querying (D) doesn't address the format mismatch at all."},{"question":"A finance-ops agent can auto-approve reimbursement requests, but company policy requires human sign-off on any single reimbursement over $2,000. The only safeguard today is a system-prompt line: 'Do not auto-approve reimbursements over $2,000.' An audit finds two reimbursements over that threshold were auto-approved last quarter. What should replace the current approach?","options":["A tool-call interception hook that inspects the reimbursement amount before the approval tool executes and blocks or redirects any request over $2,000 — a deterministic guarantee a prompt instruction cannot provide.","Move the $2,000 threshold from the system prompt into the approval tool's description field instead.","Add three few-shot examples demonstrating the agent correctly rejecting reimbursements over $2,000.","Switch to a larger, more capable model that is less likely to make instruction-following mistakes."],"correct":0,"explanation":"The audit result — real violations, not zero — is precisely the non-zero failure rate that makes prompt-only enforcement unsuitable for a compliance-critical threshold. Moving the same instruction to a different text field (B) or adding examples (C) are still prompt-based and probabilistic; a tool-call interception hook enforces the rule unconditionally in code."},{"question":"An engineer asks Claude Code to 'add comprehensive tests to this legacy service, which currently has no test coverage.' Which task decomposition approach fits this request, and why?","options":["Dynamic, adaptive decomposition — first map the codebase's structure, then identify high-impact areas from what that mapping reveals, then build a prioritized plan, since the right subtasks can't be known until the codebase has actually been explored.","A fixed sequential pipeline that reviews files in alphabetical order and writes exactly one test file per source file.","A single prompt asking Claude to 'write all necessary tests' in one uninterrupted response.","The same prompt-chaining pattern used for multi-file code review: a per-file pass followed by a cross-file integration pass."],"correct":0,"explanation":"Open-ended tasks like this can't be fully specified in advance — you don't know which modules matter most until you've explored the codebase. Adaptive decomposition (map structure, then identify high-impact areas, then plan) fits; a fixed pipeline (B, D) assumes a shape of work you can't actually know ahead of time."},{"question":"A CI code-review agent reviews an 8-file pull request in a single pass and produces inconsistent depth — thorough on the first few files, cursory on the rest. The review task itself (check each file, then check cross-file consistency) is well understood in advance and doesn't change from PR to PR. Which decomposition strategy fits best?","options":["A fixed sequential pipeline: prompt-chain a per-file local-analysis pass for every file, followed by a separate cross-file integration pass.","Dynamic, adaptive decomposition that generates an entirely new investigation plan for every pull request.","A single subagent given unlimited max_tokens to review the whole pull request in one pass.","Route each file in the pull request to a different, randomly selected model tier."],"correct":0,"explanation":"This is a predictable, multi-aspect task whose shape is known in advance — exactly the case for prompt chaining rather than adaptive decomposition. Splitting into a per-file pass plus a separate integration pass fixes the attention-dilution symptom directly; simply removing the token limit (C) misdiagnoses the problem as a capacity issue rather than an attention-quality issue."},{"question":"An engineer resumes a named Claude Code session from three days ago (`--resume refactor-auth`) to continue a refactor. In the interim, a teammate modified several files in the same module. The resumed session confidently references function signatures that no longer exist. What went wrong, and what should the engineer have done?","options":["The resumed session's tool-result history reflected file state from three days ago; the engineer should have explicitly told the agent which files changed so it could do targeted re-analysis instead of trusting stale results.","Session resumption is fundamentally unreliable for multi-day work and should never be used — every session should start from scratch.","fork_session should have been used instead of --resume, since forking always re-reads current file state from disk.","The agent should have been instructed to re-run its entire original codebase exploration from the very beginning before continuing."],"correct":0,"explanation":"A resumed session's prior tool results reflect file state at the time those tools ran, not the current state. The fix is to inform the resumed session about the specific files that changed, enabling targeted re-analysis of just the affected area — not to abandon resumption altogether (B) or force a full, expensive re-exploration (D). fork_session (C) solves a different problem — branching, not staleness."},{"question":"Two engineers want to evaluate two different refactoring strategies for the same module, both starting from an identical, already-completed codebase analysis, without either engineer's exploration affecting the other's. Which session-management feature fits this directly?","options":["fork_session — it creates an independent branch from a shared baseline, letting each strategy be explored separately with no cross-contamination.","--resume, invoked twice using the same session name.","A single shared session where both strategies are attempted in alternating turns.","Two entirely separate sessions with no shared starting context, each independently re-running the full codebase analysis from scratch."],"correct":0,"explanation":"fork_session exists specifically for exploring divergent approaches from a shared baseline — each fork is independent going forward, but both start from the same already-completed analysis instead of redoing it. Resuming the same name twice (B) doesn't create independent branches, and re-running the analysis twice from nothing (D) wastes the work that was already done once."}]},{"topic":"Tool Design & MCP Integration","questions":[{"question":"An agent has two tools available: search_docs (\"Searches documents\") and search_knowledge_base (\"Searches the knowledge base\"). Logs show it routes similar user questions to different tools from one run to the next. What is the most effective first step?","options":["Add a routing classifier upstream that pre-selects the tool before the request reaches Claude.","Add 5-8 few-shot examples to the system prompt demonstrating correct selection between the two tools.","Rewrite both descriptions to state exactly what each tool searches, with example queries, input formats, and explicit mutual exclusions.","Merge both tools into a single tool with an internal routing parameter."],"correct":2,"explanation":"Tool descriptions are the primary signal Claude uses for tool selection. Vague, near-identical descriptions are almost always the root cause of this kind of inconsistent routing, and rewriting them is the lowest-effort, highest-leverage first step. A routing classifier and few-shot examples add complexity/token overhead without fixing the underlying ambiguity; merging is a bigger architectural change than a 'first step' warrants."},{"question":"A single tool process_document handles summarization, data extraction, and fact-checking through a `mode` parameter (\"summarize\", \"extract\", \"verify\"). Users report Claude frequently passes the wrong mode value for what they actually asked. What is the most effective redesign?","options":["Split process_document into purpose-specific tools (e.g. summarize_content, extract_data_points, verify_claim_against_source), each with its own name, description, and input/output contract.","Add a preprocessing keyword parser that sets the mode parameter automatically before the request reaches Claude.","Add stricter enum validation on mode so an invalid value raises a hard error.","Keep one tool, but move the mode explanation from the tool description into the system prompt."],"correct":0,"explanation":"Splitting into purpose-specific tools lets each tool's NAME carry routing signal, which plays directly to what Claude is good at (tool selection) instead of making it reliably pick the correct value of a hidden internal parameter. Validation only detects the wrong mode after the fact rather than preventing it, and a keyword parser bypasses the model's own reasoning with a brittle heuristic."},{"question":"A system prompt includes: \"Always check inventory levels before answering product questions.\" The agent now calls check_inventory even for unrelated messages like \"What's your return policy on products?\" because they happen to contain the word \"product.\" What is the most likely cause and the correct fix?","options":["Reduce the total number of tools available to the agent so selection pressure is lower.","Rewrite the blanket system-prompt instruction to state the specific conditions under which check_inventory should be called, instead of a general keyword trigger.","Narrow the check_inventory tool's own description to more inventory-specific language.","Add a confirmation tool Claude must call to rule out inventory relevance before proceeding."],"correct":1,"explanation":"The tool's own description isn't necessarily the problem here — a blanket, keyword-triggered instruction in the system prompt is overriding good tool-selection behavior. The fix is rewriting that instruction to state specific trigger conditions, not touching the tool definition or adding more tools/steps."},{"question":"An MCP tool currently returns the plain string \"Operation failed\" for every kind of failure — timeouts, invalid input, and policy blocks all look identical to the calling agent. What is the most effective fix?","options":["Increase the automatic retry count so transient failures resolve themselves before reaching the agent.","Log the failure server-side with a stack trace for later debugging.","Replace the string with a numeric HTTP-style status code the agent can map to a fixed action.","Return structured error metadata — errorCategory, isRetryable, and a human-readable message — so the agent can choose retry, correction, or escalation appropriately."],"correct":3,"explanation":"Uniform failure strings prevent the agent from making an appropriate recovery decision. Structured metadata (errorCategory, isRetryable, message) is what lets it distinguish a worth-retrying transient failure from a validation problem or a policy block that will never succeed no matter how many times it's retried."},{"question":"A refund tool rejects a $750 request because it exceeds a $500 automatic-approval policy limit. Retrying with the identical input will never succeed. How should the tool report this?","options":["isError: true, errorCategory: \"transient\", isRetryable: true, with a generic message suggesting the agent retry with a smaller amount.","isError: true, errorCategory: \"business\", isRetryable: false, with a customer-friendly explanation of the policy limit.","isError: false, with a status field of \"pending\" so the workflow treats it as provisionally successful.","Throw an unhandled exception so the failure propagates immediately to whatever is calling the tool."],"correct":1,"explanation":"This is a business-rule violation, not a system fault — it should be marked isError: true, isRetryable: false, and errorCategory: \"business\", with a message that can be shown to the customer or a human reviewer as-is. Marking it transient would encourage wasted retries; marking it a plain success hides that the refund did not go through."},{"question":"A subagent's document-search tool times out intermittently under load. Which recovery design best matches the pattern of resolving transient failures locally and only propagating unresolvable errors?","options":["Immediately report every timeout to the coordinator and let it decide whether to retry.","Silently return an empty result set so the overall workflow isn't interrupted.","Retry the call itself once or twice with backoff inside the subagent; only if it still fails, report to the coordinator with what was attempted and any partial results already gathered.","Terminate its own execution immediately so the orchestrator restarts the entire research task from scratch."],"correct":2,"explanation":"Local recovery for transient failures avoids burning coordinator round trips on problems the subagent can likely solve itself. If it truly can't recover, propagating structured context (what was attempted, any partial results) lets the coordinator make an informed decision, unlike silently faking success or overreacting by killing the whole workflow."},{"question":"A research subagent has been given 16 tools spanning search, formatting, database writes, and email sending so it can \"handle anything that comes up.\" Tool-selection accuracy has dropped noticeably compared to when it had 5 tools. What is the most effective fix?","options":["Restrict the subagent's tools to only what its specific role requires, delegating other capabilities to separate specialized subagents.","Increase max_tokens so Claude has more room to reason about which tool to pick.","Switch to a larger model that can hold more tools in context reliably.","Reorder the tools array so more frequently used tools appear first."],"correct":0,"explanation":"A large tool count directly increases decision complexity and degrades selection reliability. The fix is scoping the subagent's tools down to its actual role and splitting the other capabilities into separate specialized subagents, not adding more tokens, a bigger model, or reordering the array."},{"question":"A synthesis subagent, whose job is only to combine already-gathered findings into a report, has full web-search tool access \"just in case.\" Logs show it now occasionally runs its own speculative searches, introducing unsourced content into reports. What is the best fix?","options":["Add a system-prompt instruction telling the synthesis agent not to use web search unless necessary.","Leave tool access as-is, but add a post-hoc review step that flags reports containing unverified claims.","Give every subagent identical tool access so behavior is consistent across the system.","Remove general web-search access from the synthesis agent; if it needs occasional simple verification, give it a narrowly scoped verify_fact tool instead, routing complex cases through the coordinator."],"correct":3,"explanation":"Agents given tools outside their specialization tend to misuse them — prompt-level discouragement is probabilistic, not a guarantee, so simply asking it not to use the tool doesn't remove the risk. The scoped fix is least-privilege: remove the broad capability, and if there's a genuine high-frequency need for simple verification, provide a narrow purpose-built tool instead while routing harder cases through the coordinator as before."},{"question":"You have three tools available (log_ticket, classify_ticket, notify_team) on a given turn and want to guarantee Claude calls one of them — you don't care which — rather than responding with plain conversational text. Which tool_choice value is correct?","options":["{\"type\": \"auto\"}","{\"type\": \"tool\", \"name\": \"classify_ticket\"}","{\"type\": \"any\"}","{\"type\": \"none\"}"],"correct":2,"explanation":"\"any\" guarantees a tool call happens without dictating which of the available tools it must be — exactly the requirement here. \"auto\" would still allow a plain text reply. Forcing classify_ticket by name would rule out log_ticket and notify_team, which isn't what's being asked. \"none\" disables tool calling entirely."},{"question":"Your team wants a shared MCP server configuration checked into version control so every developer gets the same tools on clone, with each developer's own credentials supplied locally rather than committed to the repo. Where and how should this be configured?","options":["In `~/.claude.json`, with credentials written directly into the file.","In a project-level `.mcp.json`, using environment variable expansion (e.g. `${GITHUB_TOKEN}`) so secrets are never committed.","In `CLAUDE.md`, listed as plain-text setup instructions.","As exported environment variables in each developer's shell profile, with no MCP config file at all."],"correct":1,"explanation":"Project-scoped `.mcp.json` is shared, version-controlled team tooling. Environment variable expansion (`${VAR_NAME}`) lets the committed file reference credentials without ever containing them — each developer's own environment supplies the actual value at connection time."},{"question":"You want to try out a new, unstable community MCP server for your own workflow only — it should not affect your teammates or end up committed to the repository. Where should you configure it?","options":["Project-level `.mcp.json`, so it's available to test alongside the team's tools.","A new top-level tools array added directly to the system prompt.","User-level `~/.claude.json`, so it's available only to you and never affects teammates or the repo.","A `.mcp-experimental.json` file committed to a feature branch."],"correct":2,"explanation":"User-level `~/.claude.json` is exactly for personal or experimental servers that shouldn't be shared or version-controlled. Adding it to the project's `.mcp.json` (even on a branch) risks it landing in the shared config; a system prompt isn't how MCP servers are configured at all."},{"question":"An MCP server exposes dozens of issues in a project tracker. To answer \"what issues exist in this project,\" the agent currently calls a list-issues tool, then calls a get-issue-detail tool once per issue just to build a mental map before it can reason about the actual question. What MCP feature reduces this exploratory overhead?","options":["Increase the list-issues tool's page size so more issues return per call.","Add a fuzzy-matching search_issues tool.","Cache each get-issue-detail response client-side after the first call.","Expose an MCP resource — e.g. an issue summary catalog — that the agent can read directly instead of discovering structure through repeated tool calls."],"correct":3,"explanation":"MCP resources exist precisely to expose content catalogs (issue summaries, doc hierarchies, DB schemas) so an agent doesn't have to reconstruct that structure through many exploratory tool calls. Bigger pages, fuzzy search, and caching all still require the exploratory round trips in the first place."},{"question":"An agent has both the built-in Grep tool and an MCP-provided search_codebase tool that performs ranked, cross-file semantic search, but Claude keeps defaulting to Grep even when the MCP tool would clearly give better results. What is the most effective fix?","options":["Remove the Grep tool from the agent's available tools entirely.","Rewrite the MCP tool's description to clearly explain its distinct capabilities and output (e.g. semantic, cross-file ranking) so Claude has a concrete reason to prefer it when appropriate.","Add a system-prompt rule forbidding Grep use under any circumstances.","Rename the MCP tool to include the word \"grep\" so Claude associates it with the same triggers."],"correct":1,"explanation":"The same description-quality principle that governs custom tool routing applies to MCP tools competing with built-ins: a vague description loses to a familiar built-in tool even when the MCP tool is objectively more capable. Removing Grep or banning it outright throws away a legitimately useful tool for cases where Grep actually is the right choice."},{"question":"You need to find every file in a repository matching the naming pattern `*.test.tsx`, regardless of what's written inside them. Which built-in tool is the right choice?","options":["Grep, searching file contents for the literal string \".test.tsx\".","Read, opening every file in the repository and checking its name.","Bash, with a hand-written recursive directory-walking script.","Glob, using the pattern `**/*.test.tsx` to match file paths by name."],"correct":3,"explanation":"Glob matches file paths/names by pattern and is the purpose-built tool for this job. Grep matches file contents, not paths. Read-everything doesn't scale, and a hand-written Bash script reinvents what Glob already does natively."},{"question":"You try to use Edit to change one specific line, but it reports the anchor text you provided isn't unique — it appears 5 times in the file. What is the correct fallback?","options":["Retry Edit with `replace_all: true`, even though only one occurrence should actually change.","Use Bash with `sed` to force a line-number-based replacement.","Use Read to load the full file, make the change in memory, then use Write to save the complete updated file.","Switch to Grep to find the line number, then re-run Edit unchanged."],"correct":2,"explanation":"When Edit can't find a unique anchor, the standard fallback is Read the full file, construct the corrected content, and Write it back in one shot. `replace_all: true` would incorrectly change all 5 occurrences; a shell-level sed workaround bypasses the tool's own safety mechanism instead of using the documented fallback."},{"question":"You need to find every caller of a deprecated formatCurrency function in a 200-file codebase, including calls made through a wrapper module that re-exports it under a different name. What is the most effective approach?","options":["Read every file in the repository in full before deciding where the function is used.","Ask Claude to guess likely call sites from the function's name alone, without searching the codebase.","Use Glob to find all `.js`/`.ts` files, then Read each one in full to visually scan for the function name.","Grep for the function name directly, identify any modules that re-export it under a different name, then Grep separately for each of those exported names."],"correct":3,"explanation":"Incremental codebase understanding starts with Grep for entry points rather than reading everything upfront. Because the function is re-exported under another name by a wrapper module, a single Grep for the original name would miss those call sites — the reliable approach is to first find all exported names, then Grep each one across the codebase."}]},{"topic":"Claude Code Configuration & Workflows","questions":[{"question":"A developer says Claude Code always enforces their team's commit-message format on their machine, but a new hire who cloned the same repo yesterday says Claude Code never mentions it. Both are using the same project. What is the most likely cause?","options":["The convention lives in the first developer's `~/.claude/CLAUDE.md`, a user-level file that was never committed to the repo","The new hire needs to run `claude --sync-memory` after cloning","CLAUDE.md files require a manual `git submodule update` to take effect for new clones","The convention is defined in a `.claude/skills/` file that only the first developer has invoked"],"correct":0,"explanation":"User-level CLAUDE.md (`~/.claude/CLAUDE.md`) applies only to that user's machine and is never shared via version control. If a convention should apply to everyone who clones the repo, it belongs in the project-level `CLAUDE.md` (or `.claude/rules/`), not a personal file. There is no `--sync-memory` command."},{"question":"A monorepo has a root `CLAUDE.md` plus separate `packages/api/CONVENTIONS.md` and `packages/web/CONVENTIONS.md` files with package-specific standards. The team wants every session working in `packages/api` to automatically load only the API conventions, not the web conventions, while keeping the root file short. What's the appropriate mechanism?","options":["Use `@import` in the root CLAUDE.md, or place the import inside a directory-level CLAUDE.md, so each package pulls in only its own conventions file","Paste the full contents of both CONVENTIONS.md files into the root CLAUDE.md under separate headers","Rename both CONVENTIONS.md files to CLAUDE.md and rely on Claude to infer which one is relevant","Move both files into `.claude/skills/` so they load only when explicitly invoked by name"],"correct":0,"explanation":"`@import` is the designed mechanism for pulling external files into CLAUDE.md selectively, keeping it modular. Pasting everything in defeats the purpose (option B) and bloats context for every session regardless of package. Renaming to CLAUDE.md doesn't scope anything by itself, and skills are for on-demand task procedures, not always-relevant package conventions."},{"question":"A teammate reports that Claude Code isn't following a documented convention while editing `src/routes/checkout.tsx`. You suspect a path-scoped rule exists but didn't activate. What is the fastest way to confirm which memory files actually loaded for that session?","options":["Run `/memory` to list the loaded files and check whether the relevant rule's glob pattern actually matches the file being edited","Delete `.claude/rules/` and recreate it, since corrupted rule caches are the most common cause","Ask the teammate to restate the convention in the chat so Claude re-learns it for that session","Check the repository's GitHub Actions logs, since CLAUDE.md loading is logged there"],"correct":0,"explanation":"`/memory` is the built-in diagnostic for exactly this situation — it shows which memory files loaded, in hierarchy order, letting you check whether a glob simply didn't match. There's no such thing as a corrupted rule cache to reset, restating the convention in chat doesn't fix the underlying scoping problem, and CLAUDE.md loading isn't a CI-logged event."},{"question":"You're setting up a personal shortcut command for your own workflow — it summarizes your open PRs in a format only you find useful. It has no relevance to teammates and shouldn't show up when they run Claude Code. Where should it live?","options":["`~/.claude/commands/` — a user-scoped command visible only in your own sessions","`.claude/commands/` — project-scoped so it's version-controlled","The project root `CLAUDE.md`, as a documented convention","A `.claude/skills/personal/` directory committed to the repo"],"correct":0,"explanation":"`~/.claude/commands/` is exactly for personal, unshared commands. Putting it in `.claude/commands/` (project-scoped) or committing anything to the repo (options C, D) would push a personal, irrelevant shortcut onto every teammate who clones the project."},{"question":"You're building a skill that runs a large-scale dependency audit — it reads dozens of files and produces pages of intermediate grep output before reaching a conclusion. Running it in the main conversation would consume most of the remaining context. What frontmatter field addresses this, and how?","options":["`context: fork` — runs the skill in an isolated sub-agent context so only the final summary returns to the main conversation","`allowed-tools: [Grep]` — restricting tools reduces the amount of output produced","`argument-hint` — prompts the user to scope the audit to fewer files upfront","There is no frontmatter for this; the developer must manually summarize the skill's output afterward"],"correct":0,"explanation":"`context: fork` is specifically designed to isolate verbose output-producing skills into a sub-agent, returning only a distilled result. Restricting `allowed-tools` controls *which* tools can run, not how much output they produce, and `argument-hint` just documents expected arguments — it doesn't change context isolation."},{"question":"A team wants a skill that only ever proposes a migration plan as a written report — it must never be able to modify, delete, or execute anything in the repository, even if a bug in its own logic tried to. Which frontmatter field enforces this structurally, rather than just by instruction?","options":["`allowed-tools`, restricted to read/write-report tools only (e.g. `[Read, Grep, Glob, Write]` scoped to a report file), excluding `Bash` and destructive edit tools","A prose instruction in the SKILL.md body telling the skill not to modify files","`context: fork`, since isolating the skill's context also isolates its tool access","`argument-hint`, since it constrains what arguments can be passed to the skill"],"correct":0,"explanation":"`allowed-tools` is the structural enforcement mechanism — a skill without `Bash` or destructive edit tools in its allow-list cannot execute or delete regardless of what its own reasoning concludes. A prose instruction is a request, not an enforcement mechanism (the exam consistently favors deterministic controls over prompt-only ones). `context: fork` isolates conversation context, not tool permissions, and `argument-hint` is unrelated to tool access."},{"question":"A `.claude/rules/formatting.md` file with no `paths` frontmatter sits alongside a `.claude/rules/terraform.md` file with `paths: [\"infra/**/*\"]`. What is the practical difference in when each loads?","options":["`formatting.md` loads for every session regardless of what's being edited; `terraform.md` loads only when a file under `infra/` is being touched","Both load identically on every session, since `.claude/rules/` files are always loaded once present","Neither loads automatically — both require an explicit `/rules formatting` or `/rules terraform` invocation","`terraform.md` loads for every session, and `formatting.md` never loads because it's missing required frontmatter"],"correct":0,"explanation":"A rule file with no `paths` frontmatter is unscoped and always loads, like an additional CLAUDE.md section. A rule file with `paths` frontmatter loads conditionally, only when the current task touches a matching file — this is exactly what keeps irrelevant context (Terraform conventions during a frontend task) out of unrelated sessions."},{"question":"A codebase has three distinct areas — Python data pipelines, a Go backend service, and a set of Bash deployment scripts — each with different linting and error-handling conventions. Files of each type are not confined to one directory; Bash scripts in particular are scattered across `scripts/`, `deploy/`, and several per-service `bin/` directories. What is the most maintainable way to apply each area's conventions automatically?","options":["Three `.claude/rules/` files, each scoped with a `paths` glob matching that language's file extension (e.g. `**/*.sh`) rather than a specific directory","One directory-level `CLAUDE.md` per top-level folder (`scripts/CLAUDE.md`, `deploy/CLAUDE.md`, etc.), duplicated wherever Bash scripts appear","A single root CLAUDE.md with three headers, relying on Claude to infer which section applies from file extension","Three separate skills, one per language, manually invoked whenever the relevant file type is being edited"],"correct":0,"explanation":"Glob-scoped rules key off file pattern, not directory, so `**/*.sh` applies consistently across `scripts/`, `deploy/`, and every service's `bin/` directory without duplication. Directory-level CLAUDE.md (B) can't cover files scattered across many directories without copy-pasting the same file repeatedly. A single file with headers (C) relies on inference rather than deterministic matching, and skills (D) require manual invocation rather than automatically applying as conventions are read."},{"question":"You need a rule that applies to any file matching `**/*.test.tsx` anywhere in the repository. Where does this rule's scoping information belong?","options":["In the YAML frontmatter of a `.claude/rules/` file, as `paths: [\"**/*.test.tsx\"]`","In the file name itself — naming the rule file `test.tsx.md` is sufficient for Claude Code to scope it automatically","In a `scope:` key inside CLAUDE.md pointing at the rule file","Rules cannot be scoped by glob pattern; only by exact directory path"],"correct":0,"explanation":"Path scoping is expressed via a `paths` array in the rule file's YAML frontmatter, supporting glob patterns like `**/*.test.tsx`. File naming has no special scoping meaning, CLAUDE.md doesn't declare rule scope on a rule file's behalf, and glob patterns (not just exact directories) are explicitly supported."},{"question":"A request comes in: \"Add a null check before this function dereferences `order.customer.id`, since the stack trace shows a crash there.\" What's the appropriate approach?","options":["Direct execution — this is a well-scoped, single-function change with a clear, unambiguous fix","Plan mode — any bug fix should be planned before implementation to avoid rework","Delegate to the Explore subagent to survey the whole codebase for similar null-dereference risks before touching this function","Ask the user to choose between three possible null-handling strategies before proceeding"],"correct":0,"explanation":"This is exactly the well-understood, narrowly-scoped case direct execution is for — one function, one clear fix, no architectural ambiguity. Plan mode is reserved for complex, multi-file, or architecturally ambiguous work; invoking it here is unnecessary overhead. Surveying the whole codebase or presenting design options is disproportionate to a single guarded null check."},{"question":"A team wants to replace a deprecated logging library used inconsistently across ~60 files, with three call-site patterns that each need different replacement logic, and an open question of whether to do it in one pass or behind a compatibility shim. What is the most appropriate way to start?","options":["Enter plan mode to survey the call-site patterns and decide on a migration strategy before any files are changed","Start direct execution on the first file, and let the pattern for the remaining 59 emerge as you go","Direct execution with a detailed upfront prompt specifying every file to change and in what order","Skip planning and directly write a single large commit converting all 60 files at once"],"correct":0,"explanation":"Multiple call-site patterns, an open strategic question (shim vs. big-bang), and 60 affected files are exactly the markers for plan mode: real architectural ambiguity that's cheaper to resolve before implementation than to discover mid-migration. Starting direct execution (B, C, D) assumes the approach is already settled when it explicitly isn't."},{"question":"While investigating how a legacy authentication module handles session expiry, you need to read a dozen files, trace several call paths, and grep for every caller of a deprecated function — all before you can even start deciding what to change. Why use the Explore subagent for this phase instead of doing it directly in the main conversation?","options":["It isolates the verbose intermediate discovery output (file reads, grep hits) into a sub-agent, returning a summary and preserving main-conversation context for the actual decision-making and implementation","It is the only way to read more than 10 files in a single Claude Code session","It automatically writes unit tests for whatever code it discovers","It replaces the need for plan mode entirely once exploration is complete"],"correct":0,"explanation":"The Explore subagent's value is context preservation — verbose discovery work generates output that would otherwise crowd out the main conversation's budget. There's no hard 10-file limit it works around, it doesn't generate tests, and it complements plan mode's design phase rather than replacing it."},{"question":"A prose instruction — \"format dates consistently\" — has produced inconsistent results across several generated files: some use `MM/DD/YYYY`, others ISO 8601, others relative phrases like \"3 days ago\". What is the most effective next step to get consistent output?","options":["Provide 2–3 concrete input/output examples showing exactly which raw date values should map to which formatted strings","Rewrite the instruction with more adjectives emphasizing that consistency really matters this time","Switch to a larger, more capable model so it infers the intended format on its own","Add a linter step after generation that rejects any non-ISO-8601 date and asks Claude to fix it via trial and error"],"correct":0,"explanation":"When prose is interpreted inconsistently, concrete input/output examples resolve the ambiguity directly — they show the exact transformation rather than describing it in words that can be read multiple ways. Emphatic rewording (B) doesn't add information. A bigger model (C) doesn't resolve an underspecified requirement. A post-hoc linter (D) is a much slower trial-and-error loop than just specifying the format upfront."},{"question":"Before implementing a rate-limiting feature for an internal API, in a domain you have limited experience with, what's the most effective way to surface open design questions (burst allowance, per-user vs. per-IP limits, behavior on limit breach) before code gets written?","options":["Use the interview pattern — have Claude ask clarifying questions about the unresolved considerations before implementation begins","Implement the most common industry-standard rate-limiting approach immediately and adjust later if it's wrong","Write the code first, then write tests afterward that describe whatever behavior the code happens to have","Skip requirements gathering and let code review catch any missing considerations after the PR is opened"],"correct":0,"explanation":"The interview pattern — asking questions before implementing — is designed exactly for unfamiliar-domain situations where design considerations (burst handling, scope of limiting, breach behavior) aren't yet known. Implementing immediately (B) risks building the wrong thing. Writing tests to match whatever the code does (C) inverts test-driven iteration's purpose. Deferring to code review (D) is a much more expensive place to catch a fundamentally wrong design than before implementation starts."},{"question":"A migration script fails two independent-seeming checks: (1) it doesn't handle `NULL` values in the `plan` column, and (2) a log message has a typo. Separately, it has two interacting issues: (3) retry logic double-counts failed rows on timeout, and (4) the row counter isn't safe under concurrent retries. How should this feedback be delivered?","options":["Report issues 3 and 4 together in one detailed message since they interact, and issues 1 and 2 can be handled sequentially since they're independent","Report all four issues strictly one at a time, regardless of whether they interact, to keep each round simple","Report all four issues in one message regardless of interaction, since more context is always better","Only report the highest-severity issue (3) and withhold the others until it's fixed"],"correct":0,"explanation":"Interacting issues (3 and 4) should be given together because fixing one changes the correct fix for the other — sequential fixing risks a first fix that has to be partially undone once the second issue's context lands. Independent issues (1 and 2) don't carry that risk, so sequential handling is fine and keeps each round simpler. Treating everything identically (B, C) ignores this distinction, and withholding known issues (D) just adds unnecessary iteration rounds."},{"question":"A CI pipeline step runs `claude \"Summarize the risk of this database migration\"` and the job never completes — it just sits until the runner times out. What is the correct fix?","options":["Add the `-p` (`--print`) flag so Claude Code runs non-interactively and exits after producing output","Increase the CI runner's timeout so Claude Code has more time to respond","Pipe `/dev/null` into the command's stdin to simulate a closed terminal","Split the prompt into smaller chunks sent as separate CI steps"],"correct":0,"explanation":"Without `-p`/`--print`, Claude Code runs in interactive mode and waits for input that a CI job will never provide — this is a mode problem, not a timing problem, so increasing the timeout (B) just delays the same hang. Piping `/dev/null` (C) is a workaround around the real fix. Splitting the prompt (D) doesn't address why the process is waiting for input in the first place."},{"question":"A team wants their CI-invoked review step to produce individual, actionable inline PR comments — one per issue found, each tagged with file, line, and severity — rather than a single block of prose a human has to manually re-triage. Which combination of flags supports this?","options":["`--output-format json` together with `--json-schema` pointing at a schema that defines fields like `file`, `line`, and `severity`","`--verbose` combined with `--pretty-print`","`-p` alone is sufficient; JSON structuring happens automatically once non-interactive mode is enabled","Piping the plain-text output through a separate regex-parsing script is the only supported approach"],"correct":0,"explanation":"`--output-format json` plus `--json-schema` is the documented mechanism for forcing structured, schema-conformant output your pipeline can parse programmatically into individual PR comments. `-p` alone only controls interactivity, not output structure. `--verbose`/`--pretty-print` aren't the relevant flags, and regex-parsing free text is a fragile fallback, not the supported approach."},{"question":"A Claude Code session generates a new payment-processing function, and the same session is then asked to review its own diff before opening the PR. The review comes back clean, but a human reviewer later finds a real edge-case bug. What does this scenario illustrate, and what's the better setup going forward?","options":["The same session that generated the code is a structurally weaker reviewer of it — future reviews should run as an independent instance with no memory of the generation session, given only the diff","The review flag was probably misconfigured; re-running `--output-format json` in the same session would have caught the bug","Self-review is equally reliable as independent review; this was simply an unlucky miss","The fix is to have the same session review the diff three times in a row and take a majority vote"],"correct":0,"explanation":"A session that just wrote the code carries the same assumptions into reviewing it, making it prone to confirming its own reasoning rather than challenging it — an independent review instance, seeded only with the diff, is structurally better positioned to catch what the generating session missed. Re-running with a different output flag (B) doesn't address the underlying self-review weakness, calling it equally reliable (C) contradicts the observed miss, and repeating the same biased reviewer three times (D) doesn't introduce genuine independence."}]},{"topic":"Prompt Engineering & Structured Output","questions":[{"question":"A code-review prompt currently instructs Claude to \"only report high-confidence findings\" and \"be conservative about flagging issues.\" False positives remain high. What is the most effective change?","options":["Replace the confidence-based instruction with specific categorical criteria defining exactly which issues to report (e.g., bugs, security) vs. skip (e.g., minor style, local patterns)","Lower the confidence threshold further, e.g. from 'high-confidence' to 'very high-confidence only'","Add a second Claude call that re-scores each finding's confidence before it is shown to the developer","Switch to a larger model, since confidence calibration generally improves with model scale"],"correct":0,"explanation":"General confidence language ('be conservative', 'high-confidence only') does not reliably change what gets flagged, because the model cannot measure the confidence bar you're describing. Specific categorical criteria — what to report vs. skip, per category — is what actually changes precision. Options B and C are variations on the same failed lever; D misdiagnoses a prompt problem as a model-scale problem."},{"question":"A PR-review bot's 'style' findings have a 70% false-positive rate; its 'security' findings are accurate but developers have started ignoring the tool's output entirely, including the security findings. What's happening, and what's the most effective first fix?","options":["A high false-positive rate in one category erodes trust in all categories; temporarily disable the style category while you rewrite its criteria, restoring trust in security findings immediately","Merge style and security findings into a single severity scale so developers can't tell them apart","Add a global disclaimer above all findings noting that some may be inaccurate","Increase max_tokens so the model has more room to reason about style findings before flagging them"],"correct":0,"explanation":"False-positive rates in one category damage trust in accurate categories too — that's the dynamic described. The fastest fix that restores value from what's already working is disabling the broken category while its prompt is improved, not diluting or disclaiming the good output (B, C), and token budget isn't the underlying issue (D)."},{"question":"An agent has two tools, `get_customer` and `lookup_order`, and frequently misapplies them on ambiguous requests that reference both a customer and an order. Detailed tool descriptions didn't fully resolve the ambiguity. What's the most targeted next step?","options":["Add 2-4 few-shot examples of ambiguous requests, each paired with the correct tool-call decision AND a stated reason for choosing it over the plausible alternative","Remove one of the two tools so there's no ambiguity to resolve","Add a routing classifier that pre-parses every request before it reaches the agent","Increase the temperature so the model explores more tool-call options before committing"],"correct":0,"explanation":"Few-shot examples that show ambiguous cases WITH reasoning are the most targeted fix once description quality alone hasn't resolved the ambiguity — the reasoning is what transfers to new ambiguous cases. Removing a tool (B) loses real functionality; a bespoke classifier (C) is disproportionate infrastructure for a prompt-level problem; higher temperature (D) increases randomness, not judgment quality."},{"question":"A team adds 3 few-shot examples of ambiguous escalation decisions to a support-triage prompt. On a case identical to one of the 3 examples, the model now performs perfectly. On a genuinely new ambiguous case that resembles none of the 3, performance is still poor. What does this suggest?","options":["The examples taught pattern-matching against the specific cases shown rather than the underlying decision principle — the examples likely need to demonstrate WHY a decision was made (the reasoning), not just show input/output pairs","Few-shot prompting is not effective for escalation decisions and should be abandoned in favor of a fine-tuned classifier","The prompt needs more examples — 3 is never enough for any task","This is expected and not fixable — novel cases inherently cannot be handled by prompting"],"correct":0,"explanation":"The value of few-shot examples is generalization to novel patterns via the demonstrated reasoning, not verbatim memorization of the shown cases. If novel cases still fail, the examples likely lack explicit reasoning for the decision, not just the decision itself. B and D both give up prematurely on a fixable prompt issue; C assumes quantity is the fix when quality/content (reasoning) is the more likely gap."},{"question":"An extraction pipeline pulls measurements from informal lab notes (e.g., \"about a cup\", \"roughly 2 tbsp\") into a structured `amount` + `unit` schema. The model frequently invents precise decimal values not stated in the source. What technique most directly addresses this?","options":["Few-shot examples showing correct handling of informal/imprecise phrasing, including how to represent values that are approximate rather than exact","Increase max_tokens so the model has more space to reason about unit conversion","Switch to a required-only schema so every field must always be populated","Lower the temperature to 0 to eliminate randomness in the extracted values"],"correct":0,"explanation":"Few-shot examples are the documented fix for hallucination on messy, informally-structured extraction inputs — showing the model how to faithfully represent imprecision (rather than manufacturing false precision) teaches the desired behavior directly. Required-only fields (C) would make the fabrication problem worse, not better; A and D don't address the source of the hallucination."},{"question":"You need Claude to return structured JSON for a downstream system that will reject any malformed payload. What is the most reliable way to guarantee well-formed, schema-compliant output?","options":["Use tool_use with a JSON schema defined as the tool's input_schema, and read the extracted data from the tool_use response block","Prompt Claude to 'return valid JSON only, no prose' and parse the text response with a JSON parser","Use assistant prefilling with '{' and validate the resulting string against a JSON schema after parsing","Ask Claude to double-check its own JSON for syntax errors before finalizing its response"],"correct":0,"explanation":"tool_use with a JSON schema is the most reliable mechanism for guaranteed schema-compliant output — it structurally eliminates JSON syntax errors rather than relying on the model to follow a text-formatting instruction. B and C are both prompt-only text-parsing approaches that remain vulnerable to stray prose or malformed output; D just adds another unenforced instruction."},{"question":"You expose three different extraction tools (`extract_invoice`, `extract_receipt`, `extract_contract`) to Claude and don't know in advance which document type any given input will be, but you need SOME structured tool call to occur every time — never a free-text response. Which `tool_choice` setting is correct?","options":["{\"type\": \"any\"} — Claude must call a tool, and chooses which one fits the input","{\"type\": \"auto\"} — Claude decides whether to call a tool at all","{\"type\": \"tool\", \"name\": \"extract_invoice\"} — force the most common document type","Omit tool_choice entirely so Claude defaults to the safest behavior"],"correct":0,"explanation":"\"any\" guarantees a tool call (so you always get structured output) while letting Claude pick the correct schema for an unknown document type. \"auto\" (B) risks a plain-text response instead of a tool call. Forcing a specific tool (C) would misapply the invoice schema to receipts and contracts. Omitting tool_choice (D) defaults to \"auto\" behavior, the same problem as B."},{"question":"An invoice-extraction schema marks `purchase_order_number` as a required string field. In production, roughly 30% of real invoices never state a PO number. What problem does this cause, and what's the fix?","options":["The required constraint pressures the model to fabricate a plausible-looking PO number on the 30% of invoices that lack one; make the field optional/nullable instead","No problem — tool_use guarantees the model will always find the correct value regardless of schema constraints","The fix is to lower max_tokens so the model can't generate an invented value","The fix is to switch from tool_use to prompted JSON, which handles missing fields more gracefully"],"correct":0,"explanation":"A required field on data that may legitimately be absent from the source pressures the model to invent something to satisfy the schema. Making the field nullable lets the model truthfully report absence. B ignores how required fields interact with genuinely missing data; C and D don't address the actual mechanism (the required constraint itself)."},{"question":"A `category` field uses a fixed enum (`utilities`, `software`, `travel`, `office_supplies`) for expense classification. New expense types keep appearing that don't fit any listed value, and the model is forced to pick the closest wrong bucket. What schema change best addresses this?","options":["Add an \"other\" enum value paired with a free-text category_detail field, so unmatched categories degrade gracefully instead of being miscategorized into an existing bucket","Remove the enum constraint entirely and make category a free-text string with no validation","Expand max_tokens so the model can write a longer justification for its chosen category","Add a numeric confidence score field so downstream systems can filter out low-confidence category assignments"],"correct":0,"explanation":"The enum + \"other\" + detail-string pattern is the standard fix for extensible categorization — it keeps the enum's validation value for known categories while gracefully handling anything that doesn't fit. Removing the enum (B) loses all structure and validation; C and D don't address the actual miscategorization mechanism."},{"question":"An invoice extraction via forced tool_use returns a perfectly schema-valid object, but the line items sum to $480 while `stated_total` reads $500. Why did tool_use fail to catch this, and what category of error is it?","options":["tool_use eliminates JSON syntax errors, not semantic errors — this is a semantic error (values that don't logically reconcile) requiring your own validation logic","This indicates a bug in the Anthropic SDK's schema validator that should be reported","tool_use only validates required fields, not optional ones, and stated_total was likely marked optional","This can only happen when tool_choice is set to \"auto\"; forcing a specific tool would have prevented it"],"correct":0,"explanation":"Structured output via tool_use guarantees schema-COMPLIANT output (right types, right shape) but does not validate the semantic correctness of the values themselves. A total-mismatch is a classic semantic error that requires application-level validation logic, not a tooling bug (B), a required/optional field issue (C), or a tool_choice mode issue (D)."},{"question":"A validation check finds that a receipt's tax amount was extracted into the `tip_amount` field instead. You resend the same document with a message noting: \"Validation error: tip_amount and tax_amount appear swapped — re-extract, checking each field against its label in the source.\" Is retrying appropriate here, and why?","options":["Yes — this is a format/structural misreading of information that IS present in the source, so specific error feedback lets the model self-correct on a second read","No — once an extraction is wrong, no retry can ever fix it and the record should go straight to manual entry","No — retries should never include the original document, only the error message, to avoid the model repeating its mistake","Yes, but only if the retry uses a higher temperature setting than the original request"],"correct":0,"explanation":"Retrying works well for format/structural errors — the information exists in the source, and specific feedback about what was misread lets the model re-examine and correct it. B overgeneralizes (retries do work for this error class); C is backwards — the retry should include the original document plus the failed extraction plus the specific error; D introduces an irrelevant and counterproductive lever."},{"question":"A contract-extraction schema has a `renewal_term_months` field. For a specific contract, the source document never states a renewal term anywhere — it's simply not written into the contract. Repeated retries with \"the renewal_term_months field is missing, please re-extract\" keep returning different, plausible-looking numbers each time. What's the correct interpretation and fix?","options":["The information is genuinely absent from the source, so retrying is ineffective and will keep producing fabricated values; make the field nullable and accept null rather than continuing to retry","The retries are failing because max_tokens is too low for this field","The retries are failing because the schema doesn't mark this field as an enum","The retries need more specific error messages describing exactly which decimal value is expected"],"correct":0,"explanation":"This is exactly the case where retries can't help — the required information simply isn't in the source. Re-prompting doesn't recover data that was never stated; it pressures the model to keep guessing. The fix is schema design (nullable field, accept null) plus stopping the retry loop, not a token budget, enum type, or wording change to the error message."},{"question":"A code-review tool's structured findings currently include `location`, `issue`, `severity`, and `suggested_fix`. The team wants to analyze, over time, which specific code constructs are driving the false-positive dis
